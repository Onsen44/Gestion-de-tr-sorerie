<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion de tresorerie ONSEN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#eef3f9;
  --panel:#ffffff;
  --line:#d8e0ea;
  --text:#102033;
  --muted:#697b90;
  --brand:#173d7a;
  --brand-2:#3669be;
  --ok:#0f9d58;
  --warn:#d97706;
  --danger:#c62828;
}
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#eef3fb 0%,#f8fafc 100%);color:var(--text)}
.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}
.sidebar{background:#10284d;color:#fff;padding:22px 18px;border-right:1px solid #26446f}
.brand{font-size:25px;font-weight:800;letter-spacing:-0.04em;margin-bottom:6px}
.brand-sub{font-size:12px;opacity:.72;margin-bottom:24px;line-height:1.5}
.nav{display:flex;flex-direction:column;gap:8px}
.nav button{background:transparent;border:none;color:#d9e7ff;text-align:left;padding:11px 14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.nav button.active,.nav button:hover{background:#eef4ff;color:#18396f}
.main{padding:24px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.title h1{margin:0;font-size:31px;letter-spacing:-0.04em}
.title p{margin:6px 0 0;color:var(--muted);max-width:720px;line-height:1.5}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:none;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer}
.btn.primary{background:var(--brand);color:#fff}
.btn.secondary{background:#e6eefb;color:var(--brand)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 6px 16px rgba(16,32,51,.04)}
.card h3{margin:0 0 10px;font-size:16px}
.kpi{grid-column:span 3}
.kpi .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
.kpi .value{font-size:31px;font-weight:800;margin-top:10px}
.kpi .hint{margin-top:6px;color:var(--muted);font-size:12px}
.panel-wide{grid-column:span 8}
.panel-side{grid-column:span 4}
.panel-full{grid-column:span 12}
.list{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.row{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #eef2f7;padding-bottom:10px}
.row:last-child{border-bottom:none;padding-bottom:0}
.row small{color:var(--muted);display:block;margin-top:2px}
.note{background:#fff7e9;border:1px solid #f5d9a6;color:#8a5a00;padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.empty{color:var(--muted);font-size:14px}
.hidden{display:none}
.table-wrap{overflow:auto}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:10px 8px;border-bottom:1px solid #eef2f7;text-align:left;font-size:14px;vertical-align:top}
.table th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:#f9fbfd;position:sticky;top:0}
.badge{display:inline-block;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:800}
.badge.ok{background:#e7f6ed;color:var(--ok)}
.badge.warn{background:#fff4df;color:var(--warn)}
.badge.danger{background:#fdecec;color:var(--danger)}
.chart{height:300px;display:flex;align-items:flex-end;gap:12px;padding-top:18px}
.bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:8px;min-width:60px}
.bar div{width:100%;max-width:56px;border-radius:12px 12px 4px 4px;background:linear-gradient(180deg,#6c97de,#173d7a);min-height:20px}
.bar span{font-size:11px;color:var(--muted);text-align:center}
.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;font:inherit;background:#fff}
.field textarea{min-height:88px;resize:vertical}
.import-preview{max-height:320px;overflow:auto;border:1px solid var(--line);border-radius:14px}
.flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.actions-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.inline-select,.inline-input{padding:8px 10px;border:1px solid var(--line);border-radius:10px;font:inherit;background:#fff}
.inline-input{width:170px}
.footer-note{font-size:12px;color:var(--muted)}
.success{color:var(--ok);font-weight:700}
.error{color:var(--danger);font-weight:700}
@media (max-width:1120px){
  .app{grid-template-columns:1fr}
  .sidebar{border-right:none;border-bottom:1px solid #26446f}
  .kpi,.panel-wide,.panel-side,.panel-full{grid-column:span 12}
  .form-grid{grid-template-columns:1fr 1fr}
}
@media (max-width:720px){
  .form-grid{grid-template-columns:1fr}
}
#login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,#eef3fb 0%,#f8fafc 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
#login-container{background:#fff;border-radius:18px;padding:40px;box-shadow:0 10px 40px rgba(16,32,51,.15);max-width:400px;width:100%;text-align:center}
#login-container h1{margin:0 0 10px;font-size:28px;color:var(--text)}
#login-container p{margin:0 0 30px;color:var(--muted);font-size:14px}
#login-url,#login-pwd{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:16px;margin-bottom:12px}
#login-btn{width:100%;padding:12px 16px;background:var(--brand);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer}
#login-btn:hover{background:#0d1e52}
#login-error{color:var(--danger);margin-top:12px;font-size:14px}
</style>
</head>
<body>
<div id="login-screen">
  <div id="login-container">
    <h1>Accès sécurisé</h1>
    <p>Entrez l'URL et le mot de passe pour accéder à la gestion de trésorerie</p>
    <input id="login-url" type="text" placeholder="URL du site" onkeypress="if(event.key==='Enter') loginSubmit()">
    <input id="login-pwd" type="password" placeholder="Mot de passe" onkeypress="if(event.key==='Enter') loginSubmit()">
    <button id="login-btn" onclick="loginSubmit()">Connexion</button>
    <div id="login-error"></div>
  </div>
</div>

<div class="app hidden">
  <aside class="sidebar">
    <div class="brand">ONSEN Cash</div>
    <div class="brand-sub">Tresorerie actuelle, imports bancaires, previsionnel, rapprochement bancaire et factures a regler.</div>
    <div class="nav" id="nav"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div style="display:flex; gap:20px; align-items:center; flex:1;">
        <div>
          <label style="font-size:12px; color:#697b90; font-weight:700; display:block; margin-bottom:6px;">Entité active</label>
          <select id="selectedEntite" onchange="changeEntite()" style="padding:8px 12px; border:1px solid #d8e0ea; border-radius:8px; font-weight:700; background:#fff; cursor:pointer;">
            <option value="TOUTES">TOUTES LES ENTITÉS</option>
            <option value="ALTERACIG">ALTERACIG</option>
            <option value="OSLO SHOP">OSLO SHOP</option>
            <option value="LCDV">LCDV</option>
            <option value="VAPOTE & COMPAGNIE">VAPOTE & COMPAGNIE</option>
            <option value="GROUPE ONSEN">GROUPE ONSEN</option>
          </select>
        </div>
        <div class="title" style="flex:1;">
          <h1 id="pageTitle">Accueil</h1>
          <p id="pageSubtitle">Vue immediate de la tresorerie actuelle, par entite et par compte bancaire.</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn ghost" onclick="exportWorkbook()">Exporter Excel</button>
        <button class="btn ghost" onclick="refreshData()">Actualiser</button>
        <button class="btn secondary" onclick="installWorkbook()">Installer / synchroniser le sheet</button>
        <button class="btn secondary" onclick="runInvoiceOcr()">Lancer OCR factures</button>
        <button class="btn primary" onclick="syncDriveInvoices()">Indexer les factures Drive</button>
      </div>
    </div>

    <section id="page-Accueil"></section>
    <section id="page-Gestion de tresorerie" class="hidden"></section>
    <section id="page-Graphiques" class="hidden"></section>
    <section id="page-Previsionnel" class="hidden"></section>
    <section id="page-Scenarios" class="hidden"></section>
    <section id="page-Rapprochement bancaire" class="hidden"></section>
    <section id="page-Parametres" class="hidden"></section>
  </main>
</div>

<script>
function loginSubmit() {
  const url = document.getElementById('login-url').value;
  const pwd = document.getElementById('login-pwd').value;

  if (!url || !pwd) {
    showLoginError('Veuillez entrer l\'URL et le mot de passe');
    return;
  }

  // Vérification instantanée
  const expectedUrl = 'https://script.google.com/macros/s/AKfycbwt9kiLUBAw1DN9nrCzsdTxw_hO-zzlvAg1F1PGnlTN4hc4GCpR37NAXd4_-ENI-GZQ/exec';
  const expectedPwd = '@pilori44';

  if (url.trim() === expectedUrl && pwd === expectedPwd) {
    // Identifiants corrects - connexion instantanée
    document.getElementById('login-screen').classList.add('hidden');
    document.querySelector('.app').classList.remove('hidden');
    init();
  } else {
    showLoginError('URL ou mot de passe incorrect');
  }
}

function showLoginError(msg) {
  document.getElementById('login-error').textContent = msg;
}

const state = {
  bootstrap: null,
  currentPage: 'Accueil',
  selectedEntite: 'TOUTES',
  dataCache: {},
  cacheTimestamp: {},
  cacheExpireMs: 5 * 60 * 1000, // 5 minutes
  importRows: [],
  importHeaders: [],
  mapping: {
    date: '',
    dateValeur: '',
    libelle: '',
    debit: '',
    credit: '',
    montant: '',
    solde: '',
    reference: '',
    modeReglement: ''
  }
};

const pageMeta = {
  'Accueil': 'Vue immediate de la tresorerie actuelle, par entite et par compte bancaire.',
  'Gestion de tresorerie': 'Import bancaire, anti-doublon, transactions recentes et onglet A classer.',
  'Graphiques': 'Courbes de tresorerie, previsionnel vs realise et comparaison avec la periode precedente.',
  'Previsionnel': 'Previsions par categorie ou sous-categorie, frequences et comparaison des periodes.',
  'Scenarios': 'Simulations separees du reel pour tester une hausse, une baisse ou un montant cible.',
  'Rapprochement bancaire': 'Factures a regler, indexation Drive, factures a verifier et cas de rapprochement.',
  'Parametres': 'Comptes, categories, regles, Drive et etat OCR.'
};

function init() {
  google.script.run
    .withSuccessHandler(function(data) {
      state.bootstrap = data;
      renderNav();
      renderAll();
    })
    .withFailureHandler(function(error) {
      alert(error.message || error);
    })
    .getAppBootstrap();
}

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  state.bootstrap.menu.forEach(function(page) {
    const button = document.createElement('button');
    button.textContent = page;
    button.className = page === state.currentPage ? 'active' : '';
    button.onclick = function() { showPage(page); };
    nav.appendChild(button);
  });
}

function showPage(page) {
  state.currentPage = page;
  Object.keys(pageMeta).forEach(function(name) {
    document.getElementById('page-' + name).classList.toggle('hidden', name !== page);
  });
  document.getElementById('pageTitle').textContent = page;
  document.getElementById('pageSubtitle').textContent = pageMeta[page];
  renderNav();
}

function changeEntite() {
  // Récupère l'entité sélectionnée
  const select = document.getElementById('selectedEntite');
  const newEntite = select.value;

  // Si même entité, ne rien faire
  if (newEntite === state.selectedEntite) return;

  // Changer l'entité
  state.selectedEntite = newEntite;

  // Vérifier si les données sont en cache et non expirées
  const now = Date.now();
  if (state.dataCache[newEntite] && state.cacheTimestamp[newEntite] &&
      (now - state.cacheTimestamp[newEntite]) < state.cacheExpireMs) {
    // Utiliser le cache
    const cachedData = state.dataCache[newEntite];
    updateStateWithData_(cachedData);
    renderAll();
    return;
  }

  // Sinon, charger les données du backend
  google.script.run
    .withSuccessHandler(function(data) {
      // Mettre en cache
      state.dataCache[newEntite] = data;
      state.cacheTimestamp[newEntite] = Date.now();

      // Mettre à jour l'état
      updateStateWithData_(data);

      // Actualiser l'affichage
      renderAll();
    })
    .withFailureHandler(function(error) {
      alert('Erreur lors du chargement de l\'entité: ' + error.message);
    })
    .getDataForEntite(newEntite);
}

function updateStateWithData_(data) {
  // Met à jour l'état avec les nouvelles données
  if (data.dashboard) state.bootstrap.dashboard = data.dashboard;
  if (data.aClasser) state.bootstrap.aClasser = data.aClasser;
  if (data.recentMovements) state.bootstrap.recentMovements = data.recentMovements;
  if (data.recentPrevisions) state.bootstrap.recentPrevisions = data.recentPrevisions;
  if (data.recentScenarios) state.bootstrap.recentScenarios = data.recentScenarios;
  if (data.recentRapprochements) state.bootstrap.recentRapprochements = data.recentRapprochements;
  if (data.facturesToVerify) state.bootstrap.facturesToVerify = data.facturesToVerify;
  if (data.transactionsWithoutInvoice) state.bootstrap.transactionsWithoutInvoice = data.transactionsWithoutInvoice;
  if (data.alerts) state.bootstrap.alerts = data.alerts;
  if (data.forecastSummary) state.bootstrap.forecastSummary = data.forecastSummary;
  if (data.scenarioSummary) state.bootstrap.scenarioSummary = data.scenarioSummary;
  if (data.periodAnalytics) state.bootstrap.periodAnalytics = data.periodAnalytics;
  if (data.graphData) state.bootstrap.graphData = data.graphData;
  if (data.facturesToPay) state.bootstrap.facturesToPay = data.facturesToPay;
  if (data.counts) state.bootstrap.counts = data.counts;
}

function refreshData() {
  // Vider tout le cache et recharger
  state.dataCache = {};
  state.cacheTimestamp = {};
  init();
}

function renderAll() {
  renderAccueil();
  renderTresorerie();
  renderGraphiques();
  renderPrevisionnel();
  renderScenarios();
  renderRapprochement();
  renderParametres();
  showPage(state.currentPage);
  attachEventListeners();
}

function attachEventListeners() {
  // Attacher les event listeners pour les classifications
  document.querySelectorAll('.saveClassificationBtn').forEach(function(btn) {
    btn.onclick = function(e) {
      e.preventDefault();
      const transactionUid = this.getAttribute('data-transaction-uid');
      saveClassification(transactionUid);
    };
  });

  document.querySelectorAll('.updateSousCategories').forEach(function(select) {
    select.onchange = function() {
      const transactionUid = this.getAttribute('data-transaction-uid');
      updateSousCategories(transactionUid);
    };
  });

  document.querySelectorAll('.saveInvoicePaymentBtn').forEach(function(btn) {
    btn.onclick = function(e) {
      e.preventDefault();
      const invoiceId = this.getAttribute('data-invoice-id');
      saveInvoicePayment(invoiceId);
    };
  });

  document.querySelectorAll('.saveDriveRootBtn').forEach(function(btn) {
    btn.onclick = function(e) {
      e.preventDefault();
      const entite = this.getAttribute('data-entite');
      saveDriveRoot(entite);
    };
  });
}

function euro(value) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(Number(value || 0));
}

function esc(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function exportWorkbook() {
  const exportData = state.bootstrap.exportData || {};
  const workbook = XLSX.utils.book_new();
  const sheets = [
    ['Mouvements', exportData.mouvements || []],
    ['Factures', exportData.factures || []],
    ['Rapprochements', exportData.rapprochements || []],
    ['Previsions', exportData.previsions || []]
  ];
  sheets.forEach(function(item) {
    const ws = XLSX.utils.json_to_sheet(item[1]);
    XLSX.utils.book_append_sheet(workbook, ws, item[0]);
  });
  XLSX.writeFile(workbook, 'gestion_tresorerie_export.xlsx');
}

function saveCompte() {
  const payload = {
    Compte_id: document.getElementById('param-compte-id').value,
    Entite: document.getElementById('param-compte-entite').value,
    Groupe: 'GROUPE ONSEN',
    Nom_compte: document.getElementById('param-compte-nom').value,
    Banque: document.getElementById('param-compte-banque').value,
    RIB_IBAN: document.getElementById('param-compte-rib').value,
    Devise: document.getElementById('param-compte-devise').value || 'EUR',
    Actif: document.getElementById('param-compte-actif').value,
    Type_entite: document.getElementById('param-compte-type').value,
    Commentaire: ''
  };
  google.script.run
    .withSuccessHandler(function(result) {
      state.bootstrap.config = result.config;
      state.bootstrap.counts = result.counts;
      renderAll();
      showPage('Parametres');
      alert('Compte enregistre.');
    })
    .withFailureHandler(function(error) {
      alert(error.message || error);
    })
    .upsertCompte(payload);
}

function saveCategorie() {
  const payload = {
    Categorie: document.getElementById('param-cat-categorie').value,
    Sous_categorie: document.getElementById('param-cat-sous').value,
    Type_flux: document.getElementById('param-cat-flux').value,
    Frequence: document.getElementById('param-cat-frequence').value,
    Active: document.getElementById('param-cat-active').value,
    Commentaire: document.getElementById('param-cat-commentaire').value
  };
  google.script.run
    .withSuccessHandler(function(result) {
      state.bootstrap.config = result.config;
      state.bootstrap.counts = result.counts;
      renderAll();
      showPage('Parametres');
      alert('Categorie enregistree.');
    })
    .withFailureHandler(function(error) {
      alert(error.message || error);
    })
    .upsertCategorie(payload);
}
function savePrevision() {
  const payload = {
    Prevision_id: document.getElementById('prev-id').value,
    Entite: document.getElementById('prev-entite').value,
    Compte_id: document.getElementById('prev-compte').value,
    Categorie: document.getElementById('prev-categorie').value,
    Sous_categorie: document.getElementById('prev-sous').value,
    Date_prevue: document.getElementById('prev-date').value,
    Periode: document.getElementById('prev-periode').value,
    Frequence: document.getElementById('prev-frequence').value,
    Sens: document.getElementById('prev-sens').value,
    Montant_prevu: document.getElementById('prev-montant').value,
    Mode_calcul: document.getElementById('prev-mode-calcul').value,
    Base_reference: document.getElementById('prev-base-reference').value,
    Active: document.getElementById('prev-active').value,
    Commentaire: document.getElementById('prev-commentaire').value
  };
  google.script.run
      .withSuccessHandler(function(result) {
        state.dataCache = {};
        state.cacheTimestamp = {};
        state.bootstrap.recentPrevisions = result.recentPrevisions || state.bootstrap.recentPrevisions;
        state.bootstrap.forecastSummary = result.forecastSummary || state.bootstrap.forecastSummary;
        state.bootstrap.scenarioSummary = result.scenarioSummary || state.bootstrap.scenarioSummary;
        state.bootstrap.alerts = result.alerts || state.bootstrap.alerts;
        state.bootstrap.counts = result.counts || state.bootstrap.counts;
        renderAll();
        showPage('Previsionnel');
        alert('Prevision enregistree.');
      })
      .withFailureHandler(function(error) {
        alert(error.message || error);
      })
    .upsertPrevision(payload);
}

function saveScenario() {
  const payload = {
    Scenario_id: document.getElementById('scenario-id').value,
    Nom_scenario: document.getElementById('scenario-nom').value,
    Entite: document.getElementById('scenario-entite').value,
    Categorie: document.getElementById('scenario-categorie').value,
    Sous_categorie: document.getElementById('scenario-sous').value,
    Type_ajustement: document.getElementById('scenario-type').value,
    Valeur_ajustement: document.getElementById('scenario-valeur').value,
    Montant_cible: document.getElementById('scenario-cible').value,
    Date_effet: document.getElementById('scenario-date').value,
    Active: document.getElementById('scenario-active').value,
    Commentaire: document.getElementById('scenario-commentaire').value
  };
  google.script.run
    .withSuccessHandler(function(result) {
      state.dataCache = {};
      state.cacheTimestamp = {};
      state.bootstrap.recentScenarios = result.recentScenarios || state.bootstrap.recentScenarios;
      state.bootstrap.scenarioSummary = result.scenarioSummary || state.bootstrap.scenarioSummary;
      state.bootstrap.counts = result.counts || state.bootstrap.counts;
      renderAll();
      showPage('Scenarios');
      alert('Scenario enregistre.');
    })
    .withFailureHandler(function(error) {
      alert(error.message || error);
    })
    .upsertScenario(payload);
}

function saveAlertSettings() {
  const payload = {
    alertLowBalance: document.getElementById('setting-low-balance').value,
    alertNegativeBalance: document.getElementById('setting-negative-balance').value,
    alertVarianceAmount: document.getElementById('setting-variance-amount').value,
    alertVariancePercent: document.getElementById('setting-variance-percent').value
  };
  google.script.run
    .withSuccessHandler(function(result) {
      state.bootstrap.settings = result.settings;
      state.bootstrap.alerts = result.alerts || state.bootstrap.alerts;
      renderAll();
      showPage('Parametres');
      alert('Seuils d alerte enregistres.');
    })
    .withFailureHandler(function(error) {
      alert(error.message || error);
    })
    .setAlertSettings(payload);
}


function enableAutomaticSync() {
  google.script.run
    .withSuccessHandler(function(result) {
      state.bootstrap.automaticSync = result.automaticSync;
      render();
      alert(result.message || 'Synchronisation automatique activee.');
    })
    .withFailureHandler(handleError)
    .installAutomaticSyncTrigger();
}

function disableAutomaticSync() {
  google.script.run
    .withSuccessHandler(function(result) {
      state.bootstrap.automaticSync = result.automaticSync;
      render();
      alert(result.message || 'Synchronisation automatique desactivee.');
    })
    .withFailureHandler(handleError)
    .removeAutomaticSyncTriggers();
}
function saveDriveRoot(entite) {
  const input = document.getElementById('drive-root-' + entite);
  google.script.run
    .withSuccessHandler(function(result) {
      state.bootstrap.driveConfig = result.driveConfig || state.bootstrap.driveConfig;
      state.bootstrap.config.driveRoots = result.driveConfig || state.bootstrap.config.driveRoots;
      renderAll();
      showPage('Parametres');
      alert('Dossier Drive enregistre.');
    })
    .withFailureHandler(function(error) {

function handleBankFile(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = e.target.result;
    let rows = [];
    let headers = [];
    if (file.name.toLowerCase().endsWith('.csv')) {
      const workbook = XLSX.read(data, { type: 'binary' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    } else {
      const workbook = XLSX.read(data, { type: 'binary' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    }
    headers = rows.length ? Object.keys(rows[0]) : [];
    state.importRows = rows;
    state.importHeaders = headers;
    autoDetectMapping(headers);
    renderMappingArea(file.name);
  };
  reader.readAsBinaryString(file);
}

function autoDetectMapping(headers) {
  const lower = headers.map(function(h) { return { raw: h, value: String(h).toLowerCase() }; });
  function findMatch(patterns) {
    for (let i = 0; i < lower.length; i++) {
      for (let j = 0; j < patterns.length; j++) {
        if (lower[i].value.indexOf(patterns[j]) !== -1) return lower[i].raw;
      }
    }
    return '';
  }
  state.mapping = {
    date: findMatch(['date operation', 'date', 'booking date']),
    dateValeur: findMatch(['valeur', 'date valeur', 'value date']),
    libelle: findMatch(['libelle', 'description', 'label', 'motif']),
    debit: findMatch(['debit']),
    credit: findMatch(['credit']),
    montant: findMatch(['montant', 'amount']),
    solde: findMatch(['solde', 'balance']),
    reference: findMatch(['reference', 'ref']),
    modeReglement: findMatch(['mode_reglement', 'mode reglement', 'payment'])
  };
}

function renderMappingSelect(label, key, headers) {
  return `<div class="field"><label>${label}</label><select id="map-${key}" onchange="state.mapping.${key}=this.value">` +
    `<option value="">Non mappe</option>` +
    headers.map(function(header) {
      const selected = state.mapping[key] === header ? 'selected' : '';
      return `<option value="${esc(header)}" ${selected}>${esc(header)}</option>`;
    }).join('') +
    `</select></div>`;
}

function renderImportPreview() {
  if (!state.importRows.length) return '<div class="empty" style="padding:14px">Aucune ligne a previsualiser.</div>';
  const previewHeaders = state.importHeaders.slice(0, 8);
  const previewRows = state.importRows.slice(0, 8);
  return `<table class="table"><thead><tr>${previewHeaders.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${previewRows.map(function(row) {
    return `<tr>${previewHeaders.map(function(h) { return `<td>${esc(row[h])}</td>`; }).join('')}</tr>`;
  }).join('')}</tbody></table>`;
}

function submitImport() {
  const entite = document.getElementById('importEntite').value;
  const compteId = document.getElementById('importCompte').value;
  const sourceName = document.getElementById('sourceName').value || 'import_banque';
  ['date','dateValeur','libelle','reference','debit','credit','montant','solde','modeReglement'].forEach(function(key) {
    const el = document.getElementById('map-' + key);
    if (el) state.mapping[key] = el.value;
  });
  if (!state.mapping.date || !state.mapping.libelle) {
    alert('Le mapping Date et Libelle est obligatoire.');
    return;
  }
  if (!state.mapping.montant && !state.mapping.debit && !state.mapping.credit) {
    alert('Renseigne soit Montant, soit Debit et Credit.');
    return;
  }

  google.script.run
    .withSuccessHandler(function(result) {
      alert(`Import termine. ${result.inserted} nouvelles lignes, ${result.duplicates} doublons, ${result.toClassify} a classer.`);
      state.dataCache = {};
      state.cacheTimestamp = {};
      state.bootstrap.dashboard = result.dashboard;
      state.bootstrap.aClasser = result.aClasser;
      state.bootstrap.recentMovements = result.recentMovements;
      state.bootstrap.recentPrevisions = result.recentPrevisions || state.bootstrap.recentPrevisions;
      state.bootstrap.recentRapprochements = result.recentRapprochements || state.bootstrap.recentRapprochements;
      state.bootstrap.facturesToVerify = result.facturesToVerify || state.bootstrap.facturesToVerify;
      state.bootstrap.transactionsWithoutInvoice = result.transactionsWithoutInvoice || state.bootstrap.transactionsWithoutInvoice;
      state.bootstrap.alerts = result.alerts || state.bootstrap.alerts;
      state.bootstrap.forecastSummary = result.forecastSummary || state.bootstrap.forecastSummary;
      state.bootstrap.scenarioSummary = result.scenarioSummary || state.bootstrap.scenarioSummary;
      state.bootstrap.periodAnalytics = result.periodAnalytics || state.bootstrap.periodAnalytics;
      state.bootstrap.graphData = result.graphData;
      state.bootstrap.counts = result.counts;
      state.bootstrap.facturesToPay = result.facturesToPay || state.bootstrap.facturesToPay;
      renderAll();
      showPage('Gestion de tresorerie');
    })
    .withFailureHandler(function(error) {
      alert(error.message || error);
    })
    .importBankRows({
      entite: entite,
      compteId: compteId,
      sourceName: sourceName,
      mapping: state.mapping,
      rows: state.importRows
    });
}

    .withSuccessHandler(function(result) {
      alert(`Indexation Drive terminee. ${result.inserted} factures ajoutees, ${result.toVerify} a verifier.`);
      refreshData();
    })
    .withFailureHandler(function(error) {
      alert(error.message || error);
    })
    .syncDriveInvoices({});
}
function installWorkbook() {
  google.script.run
    .withSuccessHandler(function(result) {
      alert(result.message);
      refreshData();
    })
    .withFailureHandler(function(error) {
      alert(error.message || error);
    })
    .installOrUpdateWorkbook();
}

init();
</script>
